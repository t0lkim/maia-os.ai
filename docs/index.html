        <style>
            :root {
                --bg-top: #111b22;
                --bg-bottom: #0d1117;
                --border: #24242a;
                --text: #e8e8ea;
                --text-dim: #a8a8b2;
                --accent: #00c9a7;
                --accent-bright: #00e8bf;
                --accent-deep: #009e84;
                --accent-glow: rgba(0, 201, 167, 0.06);
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            html, body {
                font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
                font-size: 17px;
                line-height: 1.6;
                color: var(--text);
                background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .page {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 48px 24px;
                position: relative;
                overflow: hidden;
            }

            .page::before {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse 800px 400px at 50% 40%, var(--accent-glow) 0%, transparent 70%);
                pointer-events: none;
            }

            .content {
                position: relative;
                text-align: center;
                max-width: 640px;
                width: 100%;
            }

            .mark {
                display: inline-block;
                width: 64px;
                height: 64px;
                margin-bottom: 48px;
            }

            .product-name {
                font-size: clamp(1.8rem, 4vw, 2.4rem);
                font-weight: 700;
                letter-spacing: -0.03em;
                line-height: 1.15;
                margin-bottom: 16px;
            }

            .product-name .accent { color: var(--accent); }

            .tagline {
                font-size: clamp(1rem, 2vw, 1.15rem);
                color: var(--text-dim);
                letter-spacing: 0.02em;
                line-height: 1.7;
                margin-bottom: 48px;
            }

            .divider {
                width: 48px;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--accent-deep) 50%, transparent);
                margin: 0 auto 32px;
            }

            footer {
                position: relative;
                text-align: center;
                font-size: 0.82rem;
                color: var(--text-dim);
                opacity: 0.75;
                margin-top: 80px;
            }

            footer a {
                color: var(--text-dim);
                text-decoration: none;
                border-bottom: 1px solid rgba(168, 168, 178, 0.3);
                transition: color 140ms ease-out, border-color 140ms ease-out;
            }

            footer a:hover, footer a:focus-visible {
                color: var(--accent);
                border-bottom-color: var(--accent);
            }

            a:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
                border-radius: 4px;
            }

            @media (prefers-reduced-motion: reduce) {
                * { transition: none !important; }
            }
        </style>
    </head>
    <body>
        <div class="page">
            <main class="content">
                <svg class="mark" viewBox="0 0 64 64" fill="none" role="img" aria-label="maiaOS">
                    <defs>

                            <stop offset="0%" stop-color="#00E8BF" />
                            <stop offset="100%" stop-color="#009E84" />
                        </linearGradient>

                    <circle cx="32" cy="32" r="24" stroke="url(#teal)" stroke-width="2" fill="none" />
                    <circle cx="32" cy="32" r="4" fill="url(#teal)" />
                    <circle cx="32" cy="32" r="13" stroke="url(#teal)" stroke-width="1" fill="none" opacity="0.4" />

            <footer>

            </footer>
        </div>
